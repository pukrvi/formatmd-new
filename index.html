<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>FormatMD — Markdown Formatter &amp; Styler</title>
    <meta name="description" content="FormatMD transforms your markdown into beautifully styled, copy-ready output. Paste, format, and export in .md, .pdf, .html, .txt." />
    <meta name="author" content="Puneet Vishnawat" />
    <meta name="keywords" content="markdown formatter, markdown styler, copy markdown, export markdown, rich text, html converter, markdown to google docs, markdown theme editor" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://formatmd.app/" />

    <!-- Theme Color (matches InfinitiGRID dark theme) -->
    <meta name="theme-color" content="#050a14" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://formatmd.app/" />
    <meta property="og:title" content="FormatMD — Markdown Formatter &amp; Styler" />
    <meta property="og:description" content="FormatMD transforms your markdown into beautifully styled, copy-ready output. Paste, format, and export in .md, .pdf, .html, .txt." />
    <meta property="og:image" content="https://formatmd.app/og-image.svg" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="FormatMD" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@InfinitiGRID" />
    <meta name="twitter:creator" content="@InfinitiGRID" />
    <meta name="twitter:title" content="FormatMD — Markdown Formatter &amp; Styler" />
    <meta name="twitter:description" content="FormatMD transforms your markdown into beautifully styled, copy-ready output. Paste, format, and export in .md, .pdf, .html, .txt." />
    <meta name="twitter:image" content="https://formatmd.app/og-image.svg" />

    <!-- PWA / Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Performance: preconnect to Supabase -->
    <link rel="preconnect" href="https://eovxyoxicltaczwcufix.supabase.co" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FormatMD",
      "description": "Markdown formatter and styler — paste, theme, and export styled markdown for Google Docs, Notion, Slack, and more.",
      "url": "https://formatmd.app",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires a modern browser with JavaScript enabled",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "InfinitiGRID",
        "url": "https://infinitigrid.com"
      },
      "author": {
        "@type": "Person",
        "name": "Puneet Vishnawat"
      },
      "featureList": [
        "Live markdown preview with split view",
        "Rich copy to clipboard as styled HTML",
        "Export as Markdown, HTML, PDF, and plain text",
        "Dark and light theme support",
        "HTML-to-Markdown paste conversion",
        "14-action formatting toolbar"
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
